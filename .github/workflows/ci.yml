name: CI - Tests and Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black flake8 mypy pytest

      - name: Run flake8
        run: |
          flake8 common life_insurance pension_calc investment_simulation vehicle_finance tests scripts

      - name: Check formatting with black
        run: |
          black --check common life_insurance pension_calc investment_simulation vehicle_finance tests scripts main.py

      - name: Run mypy (non-blocking)
        continue-on-error: true
        run: |
          mypy common life_insurance pension_calc investment_simulation vehicle_finance

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest --tb=line -q

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=common \
            --cov=life_insurance \
            --cov=pension_calc \
            --cov=investment_simulation \
            --cov=vehicle_finance \
            --cov-fail-under=58 \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --tb=line -q

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, test, coverage]

    steps:
      - name: Generate summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
